<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Academy Excellence</title>
    <link rel="icon" type="image/png" href="Logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="premium-animations.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        .thanks-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #edf6f9;
            text-align: center;
            padding: 20px;
        }
        .thanks-card {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 109, 119, 0.1);
            border: 1px solid #83c5be;
            max-width: 500px;
        }
        .check-icon {
            font-size: 60px;
            color: #006d77;
            margin-bottom: 20px;
        }
        h1 { color: #006d77; margin-bottom: 15px; }
        p { color: #555; margin-bottom: 30px; line-height: 1.6; }
        .back-btn {
            display: inline-block;
            padding: 12px 30px;
            background: #006d77;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: 0.3s;
        }
        .back-btn:hover { background: #004d54; transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="thanks-container">
        <div class="thanks-card">
            <div class="check-icon">✓</div>
            <h1>Application Received!</h1>
            <p>Thank you for reaching out to our Academy. One of our senior counselors will call you within the next 24 hours to schedule your free trial.</p>
            <a href="index.html" class="back-btn">Return to Home</a>
        </div>
    </div>
    <script src="premium-animations.js"></script>
</body>
</html>
