<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submission Successful | Utkarsh Home Tuition</title>
    <link rel="stylesheet" href="premium-animations.css">
    <link rel="icon" href="Logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #006D77;
            --accent: #2EC4B6;
            --text: #2d3436;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f0fafa 0%, #ffffff 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .thank-you-card {
            background: white;
            padding: 60px 40px;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0, 109, 119, 0.15);
            text-align: center;
            max-width: 550px;
            width: 90%;
            animation: cardAppear 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-circle {
            width: 100px;
            height: 100px;
            background: rgba(46, 196, 182, 0.1);
            color: var(--accent);
            font-size: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            animation: scaleIn 0.6s 0.3s both;
        }

        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        p {
            color: #636e72;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 16px 35px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 109, 119, 0.2);
        }

        .home-btn:hover {
            background: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(46, 196, 182, 0.3);
        }

        .social-notice {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #b2bec3;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="thank-you-card">
        <div class="icon-circle">
            <i class="fas fa-check"></i>
        </div>
        <h1>Message Sent!</h1>
        <p>Thank you for reaching out to <strong>Utkarsh Home Tuition</strong>. We have received your details and our team will contact you shortly to discuss the best tutoring plan for your child.</p>
        
        <a href="index.html" class="home-btn">
            <i class="fas fa-arrow-left"></i>
            Back to Home
        </a>

        <div class="social-notice">
            Excellence in Personalized Learning
        </div>
    </div>
    <script src="premium-animations.js"></script>
</body>
</html>
